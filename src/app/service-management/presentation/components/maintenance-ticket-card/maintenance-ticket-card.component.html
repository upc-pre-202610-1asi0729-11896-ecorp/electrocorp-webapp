<article
  class="ticket-card"
  [class.completed]="ticket.isCompleted"
  [class.canceled]="ticket.isCanceled"
>
  <div class="ticket-card__content">
    <div class="badges">
      <app-ticket-status-badge
        [value]="ticket.type"
        [label]="maintenanceTypeLabel(ticket.type)"
      />
      <app-ticket-status-badge
        [value]="ticket.status"
        [label]="statusLabel(ticket.status)"
      />
    </div>

    <h2>{{ ticket.deviceName }}</h2>

    <p>{{ ticket.description }}</p>

    <small>{{ 'serviceManagement.scheduledFor' | translate: { date: formatDate(ticket.scheduledDate) } }}</small>
  </div>

  <div class="actions">
    <app-dropdown
      [options]="statusOptions"
      [value]="ticket.status"
      [placeholder]="'history.status' | translate"
      (valueChange)="changeStatus($event)"
    />

    <app-button variant="danger" size="sm" (pressed)="onRemove()">
      {{ 'common.delete' | translate }}
    </app-button>
  </div>
</article>
